spring.application.name=truckstop-services
spring.datasource.url=jdbc:mysql://localhost:3308/truckstop_services
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=9000


springdoc.swagger-ui.path=/swagger-ui.html

# Spring Actuator Configuration
# Expose health and info endpoints (default) plus metrics and env
management.endpoints.web.exposure.include=health,info,metrics,env
# Show full health details
management.endpoint.health.show-details=always

# Enable Actuator endpoints in Swagger UI
springdoc.show-actuator=true